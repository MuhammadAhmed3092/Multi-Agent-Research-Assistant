services:
  - type: web
    name: research-assistant-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PROMPT_LIMIT
        value: "6"
      - key: GROQ_API_KEY
        sync: false        # you fill this in Render dashboard
      - key: ADMIN_KEY
        sync: false        # you fill this in Render dashboard
    disk:
      name: data
      mountPath: /data     # persistent SQLite + ChromaDB storage
      sizeGB: 1
